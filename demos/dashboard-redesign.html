<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AX-SPRINT | 공공임대주택 스마트 안전관리 대시보드</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; overflow: hidden;
      font-family: 'Segoe UI', 'Malgun Gothic', system-ui, sans-serif;
      background: #eef2ff;
    }

    /* ── Animations ── */
    @keyframes ticker-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    @keyframes blink-crit { 0%,100%{opacity:1} 50%{opacity:0.22} }
    @keyframes pulse-dot  { 0%{transform:scale(1);opacity:0.9} 70%,100%{transform:scale(2.2);opacity:0} }
    @keyframes scan-glow  { 0%,100%{opacity:0.18} 50%{opacity:0.55} }

    .blink-crit { animation: blink-crit 1.2s ease-in-out infinite; }

    /* ── Card ── */
    .card {
      background: #ffffff;
      border: 1px solid rgba(99,102,241,0.12);
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(99,102,241,0.09), 0 1px 4px rgba(99,102,241,0.05);
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .card:hover {
      box-shadow: 0 8px 36px rgba(99,102,241,0.16);
      transform: translateY(-1px);
    }
    .card-hd {
      display:flex; align-items:center; justify-content:space-between;
      padding: 12px 18px;
      border-bottom: 1px solid rgba(99,102,241,0.08);
      flex-shrink: 0;
    }

    /* ── Grid bg ── */
    .grid-bg {
      background-image:
        linear-gradient(rgba(99,102,241,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.055) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.22); border-radius: 2px; }

    /* ── Badge ── */
    .badge {
      display:inline-flex; align-items:center; gap:5px;
      padding: 4px 11px; border-radius: 99px;
      font-size: 13px; font-weight: 600; border: 1.5px solid;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
const FLOORS = [
  { id:'RF', label:'옥상',  risk:0.11, status:'safe',     desc:'옥상층' },
  { id:'F5', label:'5층',   risk:0.24, status:'safe',     desc:'주거층 상부' },
  { id:'F4', label:'4층',   risk:0.52, status:'medium',   desc:'주거층 중간' },
  { id:'F3', label:'3층',   risk:0.91, status:'critical', desc:'H-빔 F3-C12 균열 진행' },
  { id:'F2', label:'2층',   risk:0.68, status:'high',     desc:'기둥 변형 감지' },
  { id:'F1', label:'1층',   risk:0.43, status:'medium',   desc:'로비/필로티' },
  { id:'B1', label:'B1층',  risk:0.16, status:'safe',     desc:'지하주차장 상부' },
  { id:'B2', label:'B2층',  risk:0.08, status:'safe',     desc:'지하주차장 기초' },
];

const TICKER_ITEMS = [
  { lvl:'critical', text:'[긴급] SH 행복주택 1단지 101동 3층 H-빔 F3-C12 균열 진행 감지 — Antigravity 리스크 지수 91.4 초과' },
  { lvl:'warning',  text:'[경보] GBDC 봉양단지 B동 2층 기둥 비선형 FEM 해석 완료 — 좌굴 하중 87.3% 도달' },
  { lvl:'info',     text:'[완료] KICT 보고서 RPT-2024-0847 발행 승인 대기 전환 — RPA 자동 생성' },
  { lvl:'info',     text:'[정상] SH 강남임대 2단지 정기 점검 완료 — 전체 부재 1,024개 이상 없음' },
  { lvl:'warning',  text:'[주의] 대구 행복주택 C동 균열 게이지 0.8mm 임계치 초과 — 연속 모니터링 전환' },
];

const QUEUE = [
  { id:'RPT-0849', bldg:'SH 행복주택 1단지 101동', priority:'urgent', step:1, type:'AI 정밀 진단',    inspector:'홍길동 선임' },
  { id:'RPT-0848', bldg:'GBDC 봉양단지 B동',       priority:'high',   step:2, type:'정기 안전 점검',  inspector:'이영희 선임' },
  { id:'RPT-0847', bldg:'SH 강남임대 1단지',       priority:'medium', step:3, type:'KICT 기준 평가',  inspector:'박철수 검토관' },
];

const STEPS = ['🤖 AI 분석', '📐 도면 대조', '✅ KICT 검토', '📄 보고서 발행'];

/* ═══════════════════════════════════════
   SOFT PASTEL COLORS (A4 최적화)
═══════════════════════════════════════ */
const RC = (s) => ({
  critical: { f:'#f87171', t:'#dc2626', bg:'#fef2f2', b:'rgba(248,113,113,0.25)', label:'위험' },
  high:     { f:'#fb923c', t:'#ea580c', bg:'#fff7ed', b:'rgba(251,146,60,0.25)',  label:'고위험' },
  medium:   { f:'#fbbf24', t:'#d97706', bg:'#fffbeb', b:'rgba(251,191,36,0.25)',  label:'주의' },
  safe:     { f:'#4ade80', t:'#16a34a', bg:'#f0fdf4', b:'rgba(74,222,128,0.25)',  label:'정상' },
}[s] || { f:'#818cf8', t:'#4f46e5', bg:'#eef2ff', b:'rgba(129,140,248,0.25)', label:'-' });

/* ═══════════════════════════════════════
   LIVE DOT
═══════════════════════════════════════ */
function LiveDot({ color='#4ade80', size=9 }) {
  return (
    <span className="relative inline-flex" style={{width:size, height:size, flexShrink:0}}>
      <span style={{
        position:'absolute', width:'100%', height:'100%', borderRadius:'50%',
        background:color, opacity:0.5,
        animation:'pulse-dot 1.5s cubic-bezier(0,0,0.2,1) infinite',
      }}/>
      <span style={{
        position:'relative', width:'100%', height:'100%',
        borderRadius:'50%', background:color, display:'block',
      }}/>
    </span>
  );
}

/* ═══════════════════════════════════════
   KPI CARD — A4 대형 폰트
═══════════════════════════════════════ */
function KPICard({ icon, title, value, unit, sub, trend, trendUp, color }) {
  const cm = {
    emerald:{ acc:'#4ade80', val:'#16a34a', grad:'#f0fdf4', border:'rgba(74,222,128,0.22)' },
    indigo: { acc:'#818cf8', val:'#4f46e5', grad:'#eef2ff', border:'rgba(129,140,248,0.22)' },
    orange: { acc:'#fb923c', val:'#c2410c', grad:'#fff7ed', border:'rgba(251,146,60,0.22)'  },
    cyan:   { acc:'#22d3ee', val:'#0e7490', grad:'#ecfeff', border:'rgba(34,211,238,0.22)'  },
  }[color] || {};
  return (
    <div className="card flex-1 flex flex-col" style={{
      borderColor: cm.border,
      background: `linear-gradient(140deg, #fff 0%, ${cm.grad} 100%)`,
      padding: '18px 20px',
    }}>
      <div className="flex items-start justify-between mb-2">
        <div style={{fontSize:'15px', color:'#94a3b8', fontWeight:600, lineHeight:1.3,
                     textTransform:'uppercase', letterSpacing:'0.07em'}}>{title}</div>
        <span style={{fontSize:'28px', lineHeight:1}}>{icon}</span>
      </div>
      {/* BIG NUMBER — A4 1/3 가독성 핵심 */}
      <div style={{
        fontSize:'3.2rem', fontWeight:800, lineHeight:1,
        color:cm.val, fontVariantNumeric:'tabular-nums', letterSpacing:'-0.03em',
        marginBottom:'6px',
      }}>
        {value}
        <span style={{fontSize:'1.1rem', fontWeight:600, color:'#94a3b8', marginLeft:'4px'}}>{unit}</span>
      </div>
      <div style={{fontSize:'13px', color:'#94a3b8', lineHeight:1.4, flex:1}}>{sub}</div>
      <div style={{
        marginTop:'10px', fontSize:'14px', fontWeight:700,
        color: trendUp ? '#16a34a' : '#dc2626',
      }}>{trend}</div>
    </div>
  );
}

/* ═══════════════════════════════════════
   FLOOR STACK BIM — 대형 가로 바 차트
═══════════════════════════════════════ */
function FloorStack() {
  const [sel, setSel] = useState(null);
  return (
    <div className="flex flex-col gap-1.5 w-full">
      {FLOORS.map(f => {
        const c = RC(f.status);
        const isCrit = f.status === 'critical';
        const isSelected = sel === f.id;
        return (
          <div key={f.id}
            onClick={() => setSel(sel === f.id ? null : f.id)}
            className={isCrit ? 'blink-crit' : ''}
            style={{
              display:'flex', alignItems:'center', gap:'10px',
              padding: '8px 12px',
              borderRadius:'10px',
              border:`1.5px solid ${isSelected ? c.f : 'rgba(99,102,241,0.08)'}`,
              background: isSelected ? c.bg : isCrit ? '#fff8f8' : '#fafbff',
              cursor:'pointer',
              transition:'all 0.15s',
            }}
          >
            {/* floor label */}
            <div style={{
              width:'40px', flexShrink:0,
              fontSize:'15px', fontWeight:700, color:'#1e1b4b',
            }}>{f.label}</div>

            {/* bar track */}
            <div style={{flex:1, height:'22px', borderRadius:'6px',
                         background:'rgba(99,102,241,0.07)', overflow:'hidden', position:'relative'}}>
              <div style={{
                height:'100%', borderRadius:'6px',
                width:`${f.risk * 100}%`,
                background:`linear-gradient(90deg, ${c.f}cc, ${c.f})`,
                transition:'width 0.6s ease',
              }}/>
            </div>

            {/* risk % */}
            <div style={{
              width:'46px', flexShrink:0, textAlign:'right',
              fontSize:'16px', fontWeight:800, color:c.t,
              fontVariantNumeric:'tabular-nums',
            }}>{(f.risk*100).toFixed(0)}%</div>

            {/* status badge */}
            <div style={{
              width:'46px', flexShrink:0,
              fontSize:'11px', fontWeight:700, color:c.t,
              padding:'2px 6px', borderRadius:'99px',
              background:c.bg, border:`1px solid ${c.b}`, textAlign:'center',
            }}>{c.label}</div>

            {isCrit && <span style={{fontSize:'18px'}}>⚠️</span>}
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════
   QUANT AREA CHART — 부드러운 곡선, 대형 축
═══════════════════════════════════════ */
function QuantChart() {
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setTick(p => (p+1) % 240), 42);
    return () => clearInterval(t);
  }, []);

  const VW=440, VH=150;
  const pad={t:16,r:16,b:34,l:48};
  const cW=VW-pad.l-pad.r, cH=VH-pad.t-pad.b;
  const N=40;

  const mk=(seed,base,amp) => Array.from({length:N},(_,i) =>
    Math.min(0.96, Math.max(0.04,
      base + amp*Math.sin(i*0.35+seed)*0.55 + amp*Math.sin(i*0.12+seed*1.9)*0.45
      + (i>32&&seed<1 ? 0.17 : 0)
    ))
  );

  const series = useMemo(() => [
    { k:'s1', data:mk(0.4,0.56,0.20), color:'#f87171', label:'101동 F3 (위험)' },
    { k:'s2', data:mk(1.4,0.36,0.14), color:'#fb923c', label:'101동 F2 (고위험)' },
    { k:'s3', data:mk(2.3,0.20,0.08), color:'#4ade80', label:'102동 (정상)' },
  ], []);

  const sx = i => pad.l + (i/(N-1))*cW;
  const sy = v => pad.t + (1-v)*cH;

  const smooth = (data) => {
    const pts = data.map((v,i) => [sx(i), sy(v)]);
    let d = `M ${pts[0][0]},${pts[0][1]}`;
    for (let i=0; i<pts.length-1; i++) {
      const p0=pts[Math.max(0,i-1)], p1=pts[i];
      const p2=pts[i+1], p3=pts[Math.min(pts.length-1,i+2)];
      const cp1x=(p1[0]+(p2[0]-p0[0])*0.20).toFixed(1);
      const cp1y=(p1[1]+(p2[1]-p0[1])*0.20).toFixed(1);
      const cp2x=(p2[0]-(p3[0]-p1[0])*0.20).toFixed(1);
      const cp2y=(p2[1]-(p3[1]-p1[1])*0.20).toFixed(1);
      d += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2[0]},${p2[1]}`;
    }
    return d;
  };

  const area = (data) => {
    const ln = smooth(data);
    return `${ln} L${sx(N-1)},${sy(0)} L${sx(0)},${sy(0)} Z`;
  };

  const scanX = pad.l + (tick/240)*cW;
  const dangerY = sy(0.70);
  const yTks = [0, 0.25, 0.5, 0.75, 1.0];
  const xTks = ['-24h', '-16h', '-8h', 'NOW'];

  return (
    <svg width="100%" viewBox={`0 0 ${VW} ${VH}`} preserveAspectRatio="xMidYMid meet">
      <defs>
        {series.map(({k,color}) => (
          <linearGradient key={k} id={`g${k}`} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stopColor={color} stopOpacity="0.28"/>
            <stop offset="75%"  stopColor={color} stopOpacity="0.06"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        ))}
        <linearGradient id="scanG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#6366f1" stopOpacity="0.40"/>
          <stop offset="100%" stopColor="#6366f1" stopOpacity="0"/>
        </linearGradient>
      </defs>

      {/* Y grid + labels (대형 폰트) */}
      {yTks.map(v => {
        const y = sy(v);
        return (
          <g key={v}>
            <line x1={pad.l} y1={y} x2={pad.l+cW} y2={y}
              stroke="rgba(99,102,241,0.10)" strokeWidth="1" strokeDasharray="5,4"/>
            <text x={pad.l-6} y={y+4.5}
              fill="#94a3b8" fontSize="11" textAnchor="end" fontWeight="600">
              {v*100|0}%
            </text>
          </g>
        );
      })}

      {/* danger zone */}
      <rect x={pad.l} y={pad.t} width={cW} height={dangerY-pad.t}
        fill="rgba(248,113,113,0.05)"/>
      <line x1={pad.l} y1={dangerY} x2={pad.l+cW} y2={dangerY}
        stroke="rgba(220,38,38,0.38)" strokeWidth="1.5" strokeDasharray="7,4"/>
      <text x={pad.l+cW-2} y={dangerY-5}
        fill="rgba(220,38,38,0.65)" fontSize="10.5" textAnchor="end" fontWeight="700">
        위험 임계 70%
      </text>

      {/* area */}
      {series.map(({k,data}) => (
        <path key={k} d={area(data)} fill={`url(#g${k})`}/>
      ))}

      {/* lines */}
      {series.map(({k,data,color}) => (
        <path key={k} d={smooth(data)} fill="none"
          stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      ))}

      {/* scan */}
      <rect x={scanX-1} y={pad.t} width="2" height={cH} fill="url(#scanG)"/>
      {series.map(({k,data,color}) => {
        const idx = Math.round((tick/240)*(N-1));
        const cy = sy(data[Math.min(idx,N-1)]);
        return (
          <g key={k}>
            <circle cx={scanX} cy={cy} r="5" fill={color} opacity="0.20"/>
            <circle cx={scanX} cy={cy} r="3"  fill={color} opacity="0.95"/>
          </g>
        );
      })}

      {/* X labels (대형 폰트) */}
      {xTks.map((l,i) => (
        <text key={l} x={pad.l+(i/(xTks.length-1))*cW} y={VH-6}
          fill="#94a3b8" fontSize="11" textAnchor="middle" fontWeight="600">{l}</text>
      ))}
    </svg>
  );
}

/* ═══════════════════════════════════════
   PIPELINE STEP — A4 대형 스텝
═══════════════════════════════════════ */
function PStep({ idx, label, done, active }) {
  return (
    <div className="flex flex-col items-center" style={{flex:1, minWidth:0, gap:'5px'}}>
      <div style={{
        width:'32px', height:'32px', borderRadius:'50%', border:'2.5px solid',
        display:'flex', alignItems:'center', justifyContent:'center',
        fontSize:'14px', fontWeight:800, flexShrink:0,
        ...(done
          ? {background:'#4ade80', borderColor:'#22c55e', color:'#fff'}
          : active
            ? {background:'#6366f1', borderColor:'#4f46e5', color:'#fff',
               boxShadow:'0 0 0 4px rgba(99,102,241,0.18)'}
            : {background:'#fff', borderColor:'#e0e7ff', color:'#c7d2fe'})
      }}>{done ? '✓' : idx+1}</div>
      <div style={{
        fontSize:'11.5px', textAlign:'center', lineHeight:1.3,
        color: done ? '#16a34a' : active ? '#4f46e5' : '#c7d2fe',
        fontWeight: active ? 700 : done ? 600 : 400,
        whiteSpace:'pre-line',
      }}>{label}</div>
    </div>
  );
}

/* ═══════════════════════════════════════
   QUEUE ITEM — 대형 텍스트
═══════════════════════════════════════ */
function QItem({ item }) {
  const pm = {
    urgent:{ color:'#dc2626', bg:'#fef2f2', border:'rgba(248,113,113,0.30)', lbl:'긴급' },
    high:  { color:'#c2410c', bg:'#fff7ed', border:'rgba(251,146,60,0.30)',  lbl:'높음' },
    medium:{ color:'#4f46e5', bg:'#eef2ff', border:'rgba(129,140,248,0.30)', lbl:'보통' },
  }[item.priority];
  return (
    <div style={{padding:'12px 0', borderBottom:'1px solid #f1f5ff'}}>
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'6px'}}>
        <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
          <span style={{fontSize:'13px', fontFamily:'monospace', fontWeight:700, color:'#6366f1'}}>
            {item.id}
          </span>
          <span className="badge" style={{color:pm.color, background:pm.bg, borderColor:pm.border}}>
            {pm.lbl}
          </span>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
          <span className="badge" style={{color:'#6366f1', background:'#eef2ff', borderColor:'rgba(99,102,241,0.20)', fontSize:'12px'}}>
            {item.type}
          </span>
        </div>
      </div>
      <div style={{fontSize:'15px', fontWeight:700, color:'#1e1b4b', marginBottom:'2px'}}>
        {item.bldg}
      </div>
      <div style={{fontSize:'12px', color:'#94a3b8', marginBottom:'10px'}}>{item.inspector}</div>
      {/* progress steps */}
      <div style={{display:'flex', alignItems:'flex-start'}}>
        {STEPS.map((label,i) => (
          <React.Fragment key={i}>
            <PStep idx={i} label={label} done={i<item.step} active={i===item.step}/>
            {i < STEPS.length-1 && (
              <div style={{
                flexShrink:0, height:'2px', marginTop:'15px', width:'10px', borderRadius:'1px',
                background: i<item.step
                  ? 'linear-gradient(90deg,#4ade80,#22c55e)'
                  : '#e0e7ff',
              }}/>
            )}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════
   MAIN DASHBOARD
═══════════════════════════════════════ */
function Dashboard() {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const timeStr = now.toLocaleTimeString('ko-KR', {hour12:false});
  const dateStr = now.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'short'});

  return (
    <div style={{
      height:'100vh', display:'flex', flexDirection:'column', overflow:'hidden',
      background:'#eef2ff',
      backgroundImage: [
        'radial-gradient(ellipse at 80% 0%,  rgba(165,180,252,0.20) 0%, transparent 50%)',
        'radial-gradient(ellipse at 20% 100%, rgba(196,181,253,0.14) 0%, transparent 50%)',
      ].join(','),
      color:'#1e1b4b',
    }}>

      {/* ── HEADER ─────────────────────────────── */}
      <header style={{
        display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'14px 24px', flexShrink:0,
        background:'linear-gradient(135deg, #4338ca 0%, #6366f1 55%, #7c3aed 100%)',
        borderBottom:'1px solid rgba(255,255,255,0.12)',
        boxShadow:'0 4px 24px rgba(67,56,202,0.38)',
      }}>
        <div style={{display:'flex', alignItems:'center', gap:'16px'}}>
          {/* logo */}
          <div style={{
            width:'44px', height:'44px', borderRadius:'12px', flexShrink:0,
            background:'rgba(255,255,255,0.18)', border:'1.5px solid rgba(255,255,255,0.28)',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontWeight:900, fontSize:'15px', color:'#fff', letterSpacing:'-0.02em',
          }}>AX</div>
          <div>
            <div style={{fontSize:'13px', fontWeight:700, color:'rgba(199,210,254,0.80)', lineHeight:1.2}}>
              에이톰엔지니어링 · 국토교통부 AX-SPRINT
            </div>
            {/* A4 가독성: 제목 매우 크게 */}
            <div style={{fontSize:'20px', fontWeight:800, color:'#fff', lineHeight:1.25, letterSpacing:'-0.02em'}}>
              공공임대주택 시설물 스마트 안전관리 시스템
            </div>
          </div>
          <div style={{width:'1px', height:'36px', background:'rgba(255,255,255,0.18)'}}/>
          {/* 연계 기관 badges */}
          {[
            {color:'#4ade80', label:'SH 서울주택도시공사 연계'},
            {color:'#67e8f9', label:'GBDC 경북개발공사 연계'},
            {color:'#c4b5fd', label:'KICT 기준 연동'},
          ].map(({color, label}) => (
            <div key={label} style={{
              display:'flex', alignItems:'center', gap:'6px',
              padding:'5px 12px', borderRadius:'99px',
              background:`${color}1e`, border:`1.5px solid ${color}50`,
            }}>
              <LiveDot color={color} size={7}/>
              <span style={{fontSize:'12.5px', color, fontWeight:600}}>{label}</span>
            </div>
          ))}
        </div>

        <div style={{display:'flex', alignItems:'center', gap:'20px'}}>
          <div style={{display:'flex', alignItems:'center', gap:'6px'}}>
            <LiveDot color="#4ade80" size={8}/>
            <span style={{fontSize:'14px', fontWeight:700, color:'#4ade80'}}>LIVE</span>
            <span style={{fontSize:'12px', color:'rgba(199,210,254,0.60)'}}>실시간</span>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:'16px', fontFamily:'monospace', fontWeight:700, color:'#fff'}}>{timeStr}</div>
            <div style={{fontSize:'11px', color:'rgba(199,210,254,0.55)'}}>{dateStr}</div>
          </div>
          <div style={{position:'relative', cursor:'pointer', fontSize:'22px', lineHeight:1}}>
            🔔
            <span style={{
              position:'absolute', top:'-3px', right:'-5px',
              width:'18px', height:'18px', borderRadius:'50%',
              background:'#f87171', color:'#fff',
              fontSize:'9px', fontWeight:800,
              display:'flex', alignItems:'center', justifyContent:'center',
              boxShadow:'0 0 8px rgba(248,113,113,0.70)',
            }}>3</span>
          </div>
        </div>
      </header>

      {/* ── TICKER ─────────────────────────────── */}
      <div style={{
        height:'30px', display:'flex', alignItems:'center', overflow:'hidden', flexShrink:0,
        background:'#fff', borderBottom:'1px solid rgba(99,102,241,0.10)',
      }}>
        <div style={{
          flexShrink:0, height:'100%', display:'flex', alignItems:'center',
          padding:'0 14px', gap:'5px',
          background:'linear-gradient(90deg, #dc2626, #e11d48)',
          fontSize:'11px', fontWeight:800, letterSpacing:'0.12em', color:'#fff',
          boxShadow:'4px 0 10px rgba(220,38,38,0.22)',
        }}>LIVE</div>
        <div style={{overflow:'hidden', flex:1}}>
          <div style={{display:'inline-block', whiteSpace:'nowrap',
                       animation:'ticker-scroll 50s linear infinite'}}>
            {[...TICKER_ITEMS,...TICKER_ITEMS].map((item, i) => (
              <span key={i} style={{
                marginRight:'64px', fontSize:'13px',
                color: item.lvl==='critical'?'#dc2626': item.lvl==='warning'?'#d97706':'#94a3b8',
                fontWeight: item.lvl!=='info' ? 600 : 400,
              }}>{item.text}</span>
            ))}
          </div>
        </div>
      </div>

      {/* ── KPI ROW — 대형 숫자 ─────────────────── */}
      <div style={{display:'flex', gap:'14px', padding:'14px 22px 12px', flexShrink:0}}>
        <KPICard icon="🛡️" title="AI 붕괴 예방 적중률"
          value="94.7" unit="%" color="emerald"
          sub="모니터링 부재 1,247개 · 정상 1,175개"
          trend="▲ 2.3% vs 전월" trendUp={true}/>
        <KPICard icon="⚡" title="RPA 행정처리 단축률"
          value="78.4" unit="%" color="indigo"
          sub="AX-SPRINT 목표 80% · 현재 98.0% 달성"
          trend="▲ 5.1% vs 전월" trendUp={true}/>
        <KPICard icon="📊" title="Antigravity 리스크 지수"
          value="23.8" unit="/100" color="orange"
          sub="낮을수록 안전 · 전월 28.0 대비 개선"
          trend="▼ 4.2pts 개선" trendUp={true}/>
        <KPICard icon="🗺️" title="실시간 모니터링 현황"
          value="8" unit="개 단지" color="cyan"
          sub="센서 1,247개 · 경보 5.8% · 정상 94.2%"
          trend="▲ 2개 단지 신규" trendUp={true}/>
      </div>

      {/* ── MAIN CONTENT ────────────────────────── */}
      <div style={{display:'flex', flex:1, gap:'14px', padding:'0 22px 14px', minHeight:0}}>

        {/* LEFT: 3D-BIM Floor Stack ─────────────── */}
        <div className="card grid-bg" style={{
          flex:'0 0 44%', display:'flex', flexDirection:'column', minHeight:0,
        }}>
          <div className="card-hd">
            <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
              <LiveDot color="#6366f1" size={8}/>
              <span style={{fontSize:'15px', fontWeight:700, color:'#4f46e5'}}>
                3D-BIM 구조안전 디지털트윈
              </span>
            </div>
            <div style={{display:'flex', alignItems:'center', gap:'6px', flexWrap:'wrap'}}>
              <span className="badge" style={{color:'#4f46e5', background:'#eef2ff', borderColor:'rgba(99,102,241,0.22)', fontSize:'12px'}}>
                🏗️ 일송건축 Ground Truth 적용
              </span>
              <span className="badge" style={{color:'#7c3aed', background:'#f5f3ff', borderColor:'rgba(124,58,237,0.22)', fontSize:'12px'}}>
                📐 세종대 비선형 FEM 해석
              </span>
            </div>
          </div>

          <div style={{flex:1, overflow:'hidden', padding:'14px 16px', display:'flex', flexDirection:'column', gap:'10px'}}>
            {/* 건물 이름 */}
            <div style={{
              padding:'8px 14px', borderRadius:'10px',
              background:'linear-gradient(90deg, #eef2ff, #f5f3ff)',
              border:'1px solid rgba(99,102,241,0.14)',
            }}>
              <span style={{fontSize:'15px', fontWeight:700, color:'#4f46e5'}}>
                📍 SH 행복주택 1단지 101동
              </span>
              <span style={{fontSize:'12px', color:'#94a3b8', marginLeft:'10px'}}>
                업데이트: {timeStr}
              </span>
            </div>

            {/* floor bars */}
            <div style={{flex:1, overflow:'hidden'}}>
              <FloorStack/>
            </div>

            {/* legend */}
            <div style={{display:'flex', gap:'14px', flexWrap:'wrap', paddingTop:'6px',
                         borderTop:'1px solid rgba(99,102,241,0.08)'}}>
              {[['#f87171','위험 ≥80%'],['#fb923c','고위험 60~80%'],
                ['#fbbf24','주의 30~60%'],['#4ade80','정상 <30%']].map(([c,l]) => (
                <div key={l} style={{display:'flex', alignItems:'center', gap:'5px'}}>
                  <div style={{width:'12px', height:'12px', borderRadius:'3px', background:c, flexShrink:0}}/>
                  <span style={{fontSize:'12px', color:'#64748b', fontWeight:500}}>{l}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* RIGHT ──────────────────────────────── */}
        <div style={{display:'flex', flexDirection:'column', gap:'14px', flex:1, minHeight:0}}>

          {/* Quant Engine ─────────────────────── */}
          <div className="card" style={{flex:'0 0 47%', display:'flex', flexDirection:'column', minHeight:0}}>
            <div className="card-hd">
              <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                <LiveDot color="#fb923c" size={8}/>
                <span style={{fontSize:'15px', fontWeight:700, color:'#c2410c'}}>
                  Antigravity 퀀트 리스크 엔진
                </span>
                <span className="badge" style={{color:'#c2410c', background:'#fff7ed', borderColor:'rgba(251,146,60,0.22)', fontSize:'12px'}}>
                  부재 붕괴확률 실시간 예측
                </span>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:'12px'}}>
                {[{c:'#f87171',l:'101동 F3'},{c:'#fb923c',l:'F2'},{c:'#4ade80',l:'102동'}].map(({c,l}) => (
                  <span key={l} style={{display:'flex', alignItems:'center', gap:'5px', fontSize:'12px', color:'#64748b', fontWeight:500}}>
                    <span style={{width:'14px', height:'3px', background:c, borderRadius:'2px', display:'inline-block'}}/>
                    {l}
                  </span>
                ))}
              </div>
            </div>
            <div style={{flex:1, display:'flex', flexDirection:'column', minHeight:0, padding:'8px 10px 10px'}}>
              <QuantChart/>
              <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'8px', flexShrink:0, marginTop:'6px'}}>
                {[
                  {l:'101동 F3', v:'89.4%', d:'+12.3%', up:true},
                  {l:'101동 F2', v:'67.1%', d:'+8.9%',  up:true},
                  {l:'102동 평균',v:'24.5%',d:'-2.1%',   up:false},
                ].map(it => (
                  <div key={it.l} style={{
                    padding:'10px 12px', borderRadius:'12px',
                    background: it.up ? '#fef2f2' : '#f0fdf4',
                    border:`1px solid ${it.up ? 'rgba(248,113,113,0.20)' : 'rgba(74,222,128,0.20)'}`,
                  }}>
                    <div style={{fontSize:'12px', color:'#94a3b8', marginBottom:'2px'}}>{it.l}</div>
                    <div style={{fontSize:'1.4rem', fontWeight:800, color: it.up?'#dc2626':'#16a34a',
                                 fontVariantNumeric:'tabular-nums', lineHeight:1}}>{it.v}</div>
                    <div style={{fontSize:'12px', fontWeight:600, color: it.up?'#f87171':'#4ade80', marginTop:'1px'}}>
                      {it.d} 24h
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* RPA Queue ────────────────────────── */}
          <div className="card" style={{flex:1, display:'flex', flexDirection:'column', minHeight:0}}>
            <div className="card-hd">
              <div style={{display:'flex', alignItems:'center', gap:'8px'}}>
                <LiveDot color="#6366f1" size={8}/>
                <span style={{fontSize:'15px', fontWeight:700, color:'#4f46e5'}}>
                  KICT 연동 AX 보고서 자동생성 큐
                </span>
              </div>
              <div style={{display:'flex', gap:'12px', fontSize:'13px', fontWeight:600}}>
                <span style={{color:'#16a34a'}}>완료 12건</span>
                <span style={{color:'#e0e7ff'}}>·</span>
                <span style={{color:'#4f46e5'}}>처리중 5건</span>
                <span style={{color:'#e0e7ff'}}>·</span>
                <span style={{color:'#d97706'}}>대기 8건</span>
              </div>
            </div>
            <div style={{flex:1, overflowY:'auto', padding:'0 16px', minHeight:0}}>
              {QUEUE.map(item => <QItem key={item.id} item={item}/>)}
            </div>
          </div>

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Dashboard/>);
</script>
</body>
</html>
