<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AX-SPRINT | AI 데이터 파이프라인 & 워크플로우</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: #F8FAFC;
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Pipeline arrow ── */
    .pipe-arrow {
      display: flex; align-items: center; flex-shrink: 0;
      color: #6366f1; font-size: 2.8rem; font-weight: 900;
      padding: 0 4px;
    }

    /* ── Feedback loop line ── */
    @keyframes flow-dash {
      from { stroke-dashoffset: 40; }
      to   { stroke-dashoffset: 0; }
    }
    .flow-line { animation: flow-dash 1.6s linear infinite; }

    /* ── Pipeline step card ── */
    .pipe-step {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      padding: 28px 20px;
      background: #fff;
      border-radius: 20px;
      border: 2.5px solid #e0e7ff;
      box-shadow: 0 4px 18px rgba(99,102,241,0.09);
      flex: 1; min-width: 0;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .pipe-step:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(99,102,241,0.17);
    }

    /* ── AI Pipeline cards ── */
    .ai-card {
      background: #fff;
      border-radius: 20px;
      border: 2px solid #e0e7ff;
      box-shadow: 0 4px 18px rgba(99,102,241,0.08);
      padding: 32px 28px;
      display: flex; flex-direction: column; gap: 18px;
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .ai-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(99,102,241,0.15);
    }

    /* ── Progress bar ── */
    .prog-track {
      background: #e0e7ff; border-radius: 999px; height: 14px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #6366f1, #38bdf8);
      transition: width 0.6s ease;
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 20px; border-radius: 999px;
      font-size: 1.3rem; font-weight: 700;
    }

    /* ── Stat chip ── */
    .stat-chip {
      display: flex; flex-direction: column; align-items: center;
      background: #f0f4ff; border-radius: 14px; padding: 14px 18px; gap: 4px;
      flex: 1;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #e0e7ff; border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 3px; }

    /* ── Sidebar nav ── */
    .nav-item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px; border-radius: 12px;
      cursor: pointer; transition: all 0.18s;
      font-size: 1.3rem; font-weight: 500; color: #64748b;
    }
    .nav-item:hover  { background: #e0e7ff; color: #4338ca; }
    .nav-item.active { background: #6366f1; color: #ffffff; font-weight: 700; }

    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .pulse-dot { animation: pulse-dot 1.4s ease-in-out infinite; }

    @keyframes slide-right {
      0%   { transform: translateX(-6px); opacity:0.4; }
      100% { transform: translateX(6px);  opacity:1; }
    }
    .slide-r { animation: slide-right 0.9s ease-in-out infinite alternate; }
  </style>
</head>
<body>
<div id="root"></div>

          position:'sticky', top:0, zIndex:50,
          background:'rgba(248,250,252,0.95)',
          backdropFilter:'blur(8px)',
          borderBottom:'2px solid #e0e7ff',
          padding:'18px 40px',
          display:'flex', alignItems:'center', justifyContent:'space-between',
        }}>
          <div>
            <div style={{ fontSize:'2.2rem', fontWeight:900, color:'#1e1b4b', letterSpacing:'-0.5px' }}>

            </div>
            <div style={{ fontSize:'1.2rem', color:'#64748b', marginTop:2 }}>
              AI Data Pipeline · http://172.31.112.1:4200/ai-pipeline
            </div>
          </div>
          <div style={{ textAlign:'right' }}>
            <div style={{ fontSize:'2rem', fontWeight:700, color:'#6366f1', fontVariantNumeric:'tabular-nums' }}>

              display:'grid',

                <div

                    cursor:'pointer',
                    outline: activeCard === i ? '3px solid #6366f1' : 'none',

                >
                  {/* Card header */}
                  <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:14 }}>
                      <div style={{
                        fontSize:'2.8rem', lineHeight:1,
                        background:'#f0f4ff', borderRadius:14,
                        padding:'10px 14px',

                      </div>

                  {/* Model name */}
                  <div style={{
                    fontSize:'1.25rem', color:'#4338ca', fontWeight:700,
                    background:'#e0e7ff', borderRadius:10, padding:'8px 16px',
                  }}>
                    🔬 {p.model}
                  </div>

                  {/* Accuracy bar */}
                  <div>
                    <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
                      <span style={{ fontSize:'1.3rem', fontWeight:700, color:'#475569' }}>성능 정확도</span>
                      <span style={{ fontSize:'1.9rem', fontWeight:900, color:'#6366f1' }}>{p.acc}%</span>
                    </div>
                    <div className="prog-track">
                      <div className="prog-fill" style={{ width:`${p.acc}%` }}/>
                    </div>
                  </div>

                  {/* 3 stat chips */}
                  <div style={{ display:'flex', gap:10 }}>
                    {[p.chip1, p.chip2, p.chip3].map(c => (
                      <div key={c.label} className="stat-chip">
                        <div style={{ fontSize:'1.5rem', fontWeight:900, color:'#3730a3' }}>{c.val}</div>
                        <div style={{ fontSize:'1.0rem', color:'#64748b', fontWeight:600 }}>{c.label}</div>
                      </div>
                    ))}
                  </div>

                  {/* Tags */}
                  <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                    {p.tags.map(t => (
                      <span key={t} style={{
                        fontSize:'1.15rem', fontWeight:700,
                        background:'#f1f5f9', color:'#475569',
                        padding:'5px 14px', borderRadius:999,
                        border:'1.5px solid #e2e8f0',
                      }}>
                        #{t}
                      </span>
                    ))}
                  </div>

                  {/* Description (show when active) */}
                  {activeCard === i && (
                    <div style={{
                      fontSize:'1.3rem', lineHeight:1.65, color:'#334155',
                      background:'#f8fafc', borderRadius:12,
                      padding:'14px 18px',
                      border:'1.5px solid #e0e7ff',
                    }}>
                      {p.desc}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </section>

          {/* ══ FOOTER ══ */}
          <footer style={{
            textAlign:'center', padding:'16px',
            fontSize:'1.1rem', color:'#94a3b8',
          }}>
            AX-SPRINT v1.0 · 국토교통부 AI 응용제품 신속상용화 지원사업 · © 2025 AX Technologies
          </footer>

        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
