# ============================================================
# Dev-only override: starts only infra services.
# Run API + admin-web locally on host with hot reload.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   yarn workspace @ax/api start:dev      # terminal 1
#   yarn workspace @ax/admin-web start    # terminal 2
#   yarn workspace @ax/mobile-app serve  # terminal 3
# ============================================================

services:
  couchdb:
    image: couchdb:3.3
    ports:
      - '5984:5984'
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: secret
    volumes:
      # bind mount: 데이터가 .data/ 폴더에 저장되어 docker volume prune 영향 없음
      - ./.data/couchdb:/opt/couchdb/data
      - ./infra/couchdb:/opt/couchdb/etc/local.d
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5984/_up']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7.2-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/docker/minio/init-buckets.sh:/init-buckets.sh:ro
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BUCKET: ax-media
      REPORT_BUCKET: ax-reports
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/ax-media &&
        mc mb --ignore-existing local/ax-reports &&
        echo 'MinIO buckets ready (ax-media, ax-reports)'
      "

# bind mount 방식으로 변경했으므로 named volume 섹션 불필요
# 데이터는 .data/ 폴더에 저장됨 (docker volume prune 영향 없음)
# 초기화가 필요할 때만: yarn docker:reset
