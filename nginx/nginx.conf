# nginx/nginx.conf
worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 100M;   # allow large media uploads

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

  # Upstream services
  upstream api {
    server api:3000;
    keepalive 32;
  }

  upstream admin_web {
    server admin-web:4200;
  }

  upstream couchdb {
    server couchdb:5984;
  }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Angular admin web SPA
    location / {
      proxy_pass http://admin_web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";  # for Angular dev server HMR
    }

    # NestJS REST API
    location /api/ {
      limit_req zone=api_limit burst=50 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_read_timeout 120s;
    }

    # Stricter rate limit on auth endpoints
    location /api/v1/auth/ {
      limit_req zone=auth_limit burst=10 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    # CouchDB replication endpoint (PouchDB sync)
    # Accessible only for replication — NOT admin access
    location /_db/ {
      # Strip /_db prefix and forward to CouchDB
      rewrite ^/_db/(.*) /$1 break;
      proxy_pass http://couchdb;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      # Only allow replication methods
      limit_except GET POST PUT DELETE HEAD {
        deny all;
      }
    }
  }
}
